name: ocr-ci

on:
  push:
    branches: [main, develop]
    paths:
      - 'ocr-service/**'
      - '.github/workflows/ocr-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ocr-service/**'
      - '.github/workflows/ocr-ci.yml'

concurrency:
  group: ocr-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ocr-service

jobs:
  lint-test:
    name: Ruff / mypy / pytest (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ocr-service/pyproject.toml

      - name: Install minimal deps (skip PaddleOCR in CI for speed)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pydantic-settings httpx \
                      python-multipart ruff mypy pytest pytest-asyncio pytest-cov

      - name: Ruff
        run: ruff check app tests

      - name: Mypy (non-strict for Phase 0)
        run: mypy app || true

      - name: Pytest
        run: pytest --cov=app --cov-report=term-missing
