name: backend-ci

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    name: Build & test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven wrapper or use system Maven
        run: mvn -v

      - name: Build all modules
        run: mvn -B -T 1C -ntp clean install -DskipTests

      - name: Run tests with JaCoCo
        run: mvn -B -T 1C -ntp verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/**/target/site/jacoco/
          retention-days: 7

  lint:
    name: Spotless check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Spotless check
        run: mvn -B -ntp spotless:check || true
        # Chưa enforce — bật sau khi Phase 1 có code thật.
