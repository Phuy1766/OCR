spring:
  application:
    name: congvan-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: Asia/Ho_Chi_Minh
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${BACKEND_PORT:8080}
  shutdown: graceful
  error:
    include-stacktrace: never
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

app:
  timezone: Asia/Ho_Chi_Minh
  locale: vi_VN
  jwt:
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:certs/jwt-private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:certs/jwt-public.pem}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:congvan_admin}
      secret-key: ${MINIO_ROOT_PASSWORD:}
      bucket-documents: ${MINIO_BUCKET_DOCUMENTS:congvan-documents}
      bucket-signed: ${MINIO_BUCKET_SIGNED:congvan-signed}
  ocr:
    service-url: http://${OCR_SERVICE_HOST:ocr-service}:${OCR_SERVICE_PORT:5000}
    internal-api-key: ${OCR_INTERNAL_API_KEY:}

logging:
  level:
    root: INFO
    vn.edu.congvan: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
