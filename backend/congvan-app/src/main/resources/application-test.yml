spring:
  flyway:
    enabled: true
  rabbitmq:
    # Test mặc định trỏ vào host:port không tồn tại — các test không cần MQ
    # vẫn boot lên được vì RabbitTemplate là lazy. Test cần MQ thật override
    # qua @DynamicPropertySource (xem AssignmentFlowIntegrationTest).
    host: rabbitmq-not-configured
    port: 5672
    username: test
    password: test

app:
  jwt:
    private-key-path: classpath:certs/test/jwt-private.pem
    public-key-path: classpath:certs/test/jwt-public.pem
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 7
    issuer: congvan-system-test
  bootstrap:
    admin-password: test_admin_password_change_me
  security:
    rate-limit:
      enabled: false
  storage:
    minio:
      # Placeholder cho test không cần MinIO (smoke/auth/masterdata). Test thật
      # cần MinIO sẽ override qua @DynamicPropertySource (xem InboundFlowIntegrationTest).
      endpoint: http://minio-not-configured:9000
      access-key: test_placeholder_key
      secret-key: test_placeholder_secret
      bucket-documents: congvan-test-documents
      bucket-signed: congvan-test-signed
  outbox:
    # Disable outbox publisher mặc định — test cần outbox sẽ override.
    enabled: false
  signature:
    # Disable signature gate mặc định — Phase 4 test không có chữ ký số.
    # SignatureFlowIntegrationTest override = true qua @DynamicPropertySource.
    gate-enabled: false
