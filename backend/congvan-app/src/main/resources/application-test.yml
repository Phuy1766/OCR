spring:
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

app:
  jwt:
    private-key-path: classpath:certs/test/jwt-private.pem
    public-key-path: classpath:certs/test/jwt-public.pem
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 7
    issuer: congvan-system-test
  bootstrap:
    admin-password: test_admin_password_change_me
  security:
    rate-limit:
      enabled: false
  storage:
    minio:
      # Placeholder cho test không cần MinIO (smoke/auth/masterdata). Test thật
      # cần MinIO sẽ override qua @DynamicPropertySource (xem InboundFlowIntegrationTest).
      endpoint: http://minio-not-configured:9000
      access-key: test_placeholder_key
      secret-key: test_placeholder_secret
      bucket-documents: congvan-test-documents
      bucket-signed: congvan-test-signed
