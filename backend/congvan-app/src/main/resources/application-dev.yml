spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:congvan}
    username: ${POSTGRES_USER:congvan}
    password: ${POSTGRES_PASSWORD:congvan_dev_password_change_me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:congvan}
    password: ${RABBITMQ_PASSWORD:congvan_dev_password_change_me}
    virtual-host: ${RABBITMQ_VHOST:/}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
